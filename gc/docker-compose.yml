version: '3.8'

services:
  # 1. TimescaleDB (PostgreSQL时序数据库)
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: rsi_timescaledb
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-rsi_tracker}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./docker/timescaledb/init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"  # 仅本地访问
    networks:
      - rsi_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis缓存服务
  redis:
    image: redis:7-alpine
    container_name: rsi_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # 仅本地访问
    networks:
      - rsi_network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. FastAPI Web应用服务
  api:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile
    container_name: rsi_api
    restart: unless-stopped
    depends_on:
      - timescaledb
      - redis
    volumes:
      - ./app:/app
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@timescaledb:5432/${POSTGRES_DB:-rsi_tracker}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      - ENABLE_NOTIFICATIONS=true
    networks:
      - rsi_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 4. Celery Worker任务处理服务
  worker:
    build:
      context: .
      dockerfile: ./docker/celery/Dockerfile
    container_name: rsi_worker
    restart: unless-stopped
    command: celery -A app.tasks.worker worker --loglevel=info --concurrency=2
    depends_on:
      - redis
      - api
    volumes:
      - ./app:/app
      - ./logs:/app/logs
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@timescaledb:5432/${POSTGRES_DB:-rsi_tracker}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      - C_FORCE_ROOT=true
      - ENABLE_NOTIFICATIONS=true
    networks:
      - rsi_network
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.worker", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 5. Celery Beat定时任务服务
  beat:
    build:
      context: .
      dockerfile: ./docker/celery/Dockerfile
    container_name: rsi_beat
    restart: unless-stopped
    command: celery -A app.tasks.worker beat --loglevel=info
    depends_on:
      - redis
      - worker
    volumes:
      - ./app:/app
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@timescaledb:5432/${POSTGRES_DB:-rsi_tracker}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
    networks:
      - rsi_network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'celery -A app.tasks.worker beat' | grep -v grep || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 6. Flower监控服务
  flower:
    build:
      context: .
      dockerfile: ./docker/celery/Dockerfile
    container_name: rsi_flower
    restart: unless-stopped
    command: celery -A app.tasks.worker flower --port=5555
    depends_on:
      - redis
      - worker
    volumes:
      - ./app:/app
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
    networks:
      - rsi_network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 7. 前端Vue应用服务
  frontend:
    build:
      context: ./frontend
      dockerfile: ./docker/frontend/Dockerfile
      args:
        - API_URL=/api/v1
    container_name: rsi_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - rsi_network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 8. Nginx反向代理服务
  nginx:
    image: nginx:1.25-alpine
    container_name: rsi_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
      - frontend_build:/usr/share/nginx/html
    depends_on:
      - api
      - frontend
      - flower
      - prometheus
      - grafana
    networks:
      - rsi_network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 9. 备份服务
  backup:
    build:
      context: .
      dockerfile: ./docker/backup/Dockerfile
    container_name: rsi_backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
      - timescaledb_data:/var/lib/postgresql/data:ro
      - redis_data:/data/redis:ro
      - ./docker/backup/scripts:/scripts
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=timescaledb
      - REDIS_HOST=redis
    networks:
      - rsi_network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "ls /scripts/backup.sh && exit 0 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

  # 10. Prometheus监控服务
  prometheus:
    image: prom/prometheus:latest
    container_name: rsi_prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - rsi_network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 11. Grafana可视化服务
  grafana:
    image: grafana/grafana:latest
    container_name: rsi_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - rsi_network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  rsi_network:
    driver: bridge

volumes:
  timescaledb_data:
    driver: local
  redis_data:
    driver: local
  frontend_build:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
