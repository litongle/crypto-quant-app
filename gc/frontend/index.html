<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="RSI分层极值追踪自动量化交易系统" />
    <meta name="keywords" content="量化交易,RSI策略,加密货币,自动交易,OKX,ETH" />
    <meta name="author" content="Factory AI" />
    <meta name="theme-color" content="#2c3e50" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <title>RSI分层极值追踪量化系统</title>
    
    <!-- 预加载字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
    
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: 'Noto Sans SC', sans-serif, system-ui, -apple-system, BlinkMacSystemFont;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f5f7fa;
        color: #2c3e50;
      }
      
      #app {
        width: 100%;
        height: 100%;
      }
      
      .app-loading {
        display: flex;
        width: 100%;
        height: 100%;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background-color: #f5f7fa;
      }
      
      .app-loading .app-loading-title {
        display: flex;
        margin-top: 30px;
        font-size: 24px;
        color: #2c3e50;
        justify-content: center;
        align-items: center;
      }
      
      .app-loading .app-loading-logo {
        width: 120px;
        height: 120px;
        margin-bottom: 20px;
      }
      
      .app-loading .app-loading-item {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 40px;
        width: 40px;
        position: relative;
      }
      
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #409EFF;
        animation: bounce 1s infinite ease-in-out;
        position: absolute;
      }
      
      .dot:nth-child(1) {
        animation-delay: 0s;
        left: 0;
      }
      
      .dot:nth-child(2) {
        animation-delay: 0.2s;
        left: 15px;
      }
      
      .dot:nth-child(3) {
        animation-delay: 0.4s;
        right: 0;
      }
      
      @keyframes bounce {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- 应用加载动画 -->
      <div class="app-loading">
        <div class="app-loading-item">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <h1 class="app-loading-title">RSI分层极值追踪量化系统</h1>
        <div>正在加载中，请稍候...</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
